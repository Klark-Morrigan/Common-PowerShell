name: CI (Docker target)

# Reusable workflow for repos whose integration tests connect to a Docker
# container via SSH (Infrastructure-GitHubRunners pattern). Builds the SSH
# test image with GHA layer caching, then runs Pester directly on the host
# so the tests can control Docker themselves.
#
# Consumer repos call this from their own workflow:
#
#   jobs:
#     ci-docker-target:
#       uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell-docker-target.yml@master
#
# Every `uses:` for a Common-PowerShell composite is a local `./` path
# (see ci-powershell.yml header for the eager-resolution rationale).
# External consumers get a conditional sparse checkout of
# Common-PowerShell at master into `.powershell-common/`. The
# build-ssh-test-image composite lives in Common-Automation, so the same
# pattern fetches Common-Automation unconditionally into `.common-automation/`.

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  integration:
    name: Integration (PowerShell 7) - Docker host SSH target
    runs-on: ubuntu-latest

    # See ci-powershell-docker-host.yml for why this is declared at the
    # job level of the reusable workflow rather than left to the caller.
    permissions:
      contents: read

    steps:
      - name: Check out caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Stage Common-PowerShell composites
        if: github.repository != 'Klark-Morrigan/Common-PowerShell'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-PowerShell
          ref: master
          path: .powershell-common
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Stage Common-Automation composites
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - name: Scan for integration tests (self)
        id: scan-self
        if: ${{ github.repository == 'Klark-Morrigan/Common-PowerShell' }}
        uses: ./.github/actions/scan-integration-tests
        with:
          test-dir: Tests/Integration.DockerTarget

      - name: Scan for integration tests (consumer)
        id: scan-consumer
        if: ${{ github.repository != 'Klark-Morrigan/Common-PowerShell' }}
        uses: ./.powershell-common/.github/actions/scan-integration-tests
        with:
          test-dir: Tests/Integration.DockerTarget

      - name: Build SSH test image
        if: ${{ steps.scan-self.outputs.has-tests == 'true' || steps.scan-consumer.outputs.has-tests == 'true' }}
        uses: ./.common-automation/.github/actions/build-ssh-test-image

      - name: Run SSH integration tests (self)
        if: ${{ steps.scan-self.outputs.has-tests == 'true' }}
        uses: ./.github/actions/run-ssh-integration-tests

      - name: Run SSH integration tests (consumer)
        if: ${{ steps.scan-consumer.outputs.has-tests == 'true' }}
        uses: ./.powershell-common/.github/actions/run-ssh-integration-tests
