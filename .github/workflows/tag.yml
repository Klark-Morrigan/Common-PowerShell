name: Tag from manifest version

# Reusable workflow shared by all Infrastructure-* module repos.
# Creates a git tag for the manifest version and exposes tag_created so
# callers can gate downstream jobs (e.g. publish) on whether a new tag
# was actually pushed.
# Callers are responsible for the version check and tests before invoking
# this workflow - see release.yml for the expected call pattern.
#
# Every `uses:` for a PowerShell-Common composite is a local `./` path
# (see ci-powershell.yml header for the eager-resolution rationale).
# External consumers get a conditional sparse checkout of
# PowerShell-Common at master into `.powershell-common/`.

on:
  workflow_call:
    inputs:
      psd1:
        description: >
          Path to the .psd1 manifest relative to the repo root
          (e.g. PowerShell.Common\PowerShell.Common.psd1).
        required: true
        type: string
    outputs:
      tag_created:
        description: "'true' if a new tag was created, 'false' otherwise."
        value: ${{ jobs.run.outputs.tag_created }}

jobs:
  run:
    runs-on: windows-latest
    outputs:
      tag_created: ${{ steps.tag-self.outputs.tag_created || steps.tag-consumer.outputs.tag_created }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - if: github.repository != 'VitaliiAndreev/PowerShell-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/PowerShell-Common
          ref: master
          path: .powershell-common
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - id: tag-self
        if: github.repository == 'VitaliiAndreev/PowerShell-Common'
        uses: ./.github/actions/tag-from-manifest
        with:
          psd1: ${{ inputs.psd1 }}

      - id: tag-consumer
        if: github.repository != 'VitaliiAndreev/PowerShell-Common'
        uses: ./.powershell-common/.github/actions/tag-from-manifest
        with:
          psd1: ${{ inputs.psd1 }}
