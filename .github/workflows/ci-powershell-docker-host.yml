name: CI (Docker host)

# Reusable workflow that runs integration tests. Delegates to the
# run-integration-tests composite action in Infrastructure-Common, which
# contains all the Docker run logic. Consumer repos call this workflow from
# their own ci-docker-host.yml and optionally pass docker-image to pin a
# specific Ubuntu variant (see action inputs for when this is needed).

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
    inputs:
      docker-image:
        description: >
          Docker image to run integration tests in. Defaults to
          mcr.microsoft.com/powershell:latest. Consumer repos that install
          system packages (e.g. openssh-server) during tests can pin a
          specific Ubuntu variant to avoid apt compatibility issues.
        required: false
        type: string
        default: 'mcr.microsoft.com/powershell:latest'
  workflow_dispatch:

jobs:
  # Runs when this workflow is triggered directly on Infrastructure-Common
  # (pull_request / workflow_dispatch). Uses local action paths so they are
  # resolvable even before this branch is merged to master.
  integration-local:
    name: Integration (PowerShell 7) - Docker host tests
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' }}

    steps:
      - uses: actions/checkout@v5

      - name: Scan for integration tests
        id: scan
        uses: ./.github/actions/scan-integration-tests
        with:
          test-dir: Tests/Integration.DockerHost
          check-module-dir: 'true'

      - if: ${{ steps.scan.outputs.has-tests == 'true' }}
        uses: ./.github/actions/run-integration-tests
        with:
          # inputs.docker-image is only populated on workflow_call triggers.
          # On pull_request / workflow_dispatch it is absent and evaluates to
          # an empty string, which would override the action's own default and
          # produce an invalid docker reference. The || fallback restores the
          # default for non-workflow_call triggers.
          docker-image: ${{ inputs.docker-image || 'mcr.microsoft.com/powershell:latest' }}
          test-file-paths: ${{ steps.scan.outputs.test-file-paths }}
          module-dir: ${{ steps.scan.outputs.module-dir }}

  # Runs when a consumer repo calls this workflow via workflow_call. Uses
  # pinned external action paths (requires the actions to be on master).
  integration-consumer:
    name: Integration (PowerShell 7) - Docker host tests
    runs-on: ubuntu-latest
    if: ${{ github.repository != 'VitaliiAndreev/Infrastructure-Common' }}

    steps:
      - uses: actions/checkout@v5

      - name: Scan for integration tests
        id: scan
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/scan-integration-tests@master
        with:
          test-dir: Tests/Integration.DockerHost
          check-module-dir: 'true'

      - if: ${{ steps.scan.outputs.has-tests == 'true' }}
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/run-integration-tests@master
        with:
          docker-image: ${{ inputs.docker-image || 'mcr.microsoft.com/powershell:latest' }}
          test-file-paths: ${{ steps.scan.outputs.test-file-paths }}
          module-dir: ${{ steps.scan.outputs.module-dir }}
