name: CI

# Reusable unit-test workflow for PowerShell repos. Delegates to four
# composite actions in Common-PowerShell, run in this order:
#   - lint-powershell-parses:          syntax floor - fails on any parse
#                                      error before anything else runs.
#   - lint-no-bare-return-empty-array: catches the producer-side empty-array
#                                      footgun on every consumer PR.
#   - lint-powershell-psscriptanalyzer: full PSScriptAnalyzer rule set - the
#                                      deeper static layer the parse gate
#                                      defers to (rules live in its settings).
#   - run-unit-tests:                  excludes Tests\Integration\ automatically.
# All three lints lead because they are static checks - failing fast on
# them spares the slower behavioural run on a trivial defect. The parse
# gate leads the lints as the syntax floor (see the step comments for the
# full why, including the trade-off this order accepts); the heavier
# PSScriptAnalyzer pass runs last of the three.
# Integration tests run separately via ci-powershell-docker-host.yml and
# ci-powershell-docker-target.yml.
#
# Every `uses:` for a Common-PowerShell composite is a local `./` path,
# never a fully-qualified `@master` ref. The reason: GitHub Actions
# eagerly resolves every registry-form `uses:` at job-prep time before
# step-level `if:` guards are evaluated, so a PR that introduces a
# brand new composite would fail prep before any step could run. Local
# refs are resolved at step-execution time after checkout has
# populated the workspace, so they side-step the eager-resolution
# failure mode entirely. External consumers get a conditional sparse
# checkout of Common-PowerShell at master into `.powershell-common/` so the
# external `./` branch has a populated path.

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  ci-ps7:
    name: Unit (PowerShell 7)
    runs-on: windows-latest

    # See ci-powershell-docker-host.yml for why this is declared at the
    # job level of the reusable workflow rather than left to the caller.
    permissions:
      contents: read

    steps:
      - name: Check out caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Stage Common-PowerShell composites
        if: github.repository != 'Klark-Morrigan/Common-PowerShell'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-PowerShell
          ref: master
          path: .powershell-common
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      # Both lints run BEFORE the unit tests: they are static, sub-second
      # checks, so failing fast on them spares the cost of the slower
      # behavioural run when a PR has a trivial syntax or shape defect.
      #
      # Within the lint pass, the parse gate goes first as the syntax
      # floor: a file that does not parse cannot be meaningfully scanned
      # or tested, and a parse error reported as File.ps1:line is far
      # clearer than the Pester discovery cascade you get when a broken
      # file is dot-sourced by a test downstream.
      #
      # Trade-off accepted by running the bare-return lint ahead of the
      # unit tests: that lint is a hand-rolled regex whose own correctness
      # is gated by Tests\Test-NoBareReturnEmptyArray.Tests.ps1. Running
      # it before those tests reopens a one-commit gap - a regression that
      # made the lint pass-always could land a real bare-return defect,
      # caught only on the next PR. Fast feedback is preferred over closing
      # that narrow window. The parse gate does not carry the same risk: it
      # delegates to the platform parser, so its custom surface is tiny.
      - name: lint-powershell-parses (self)
        if: github.repository == 'Klark-Morrigan/Common-PowerShell'
        uses: ./.github/actions/lint-powershell-parses
        with:
          source-root: ${{ github.workspace }}
      - name: lint-powershell-parses (consumer)
        if: github.repository != 'Klark-Morrigan/Common-PowerShell'
        uses: ./.powershell-common/.github/actions/lint-powershell-parses
        with:
          source-root: ${{ github.workspace }}

      - name: lint-no-bare-return-empty-array (self)
        if: github.repository == 'Klark-Morrigan/Common-PowerShell'
        uses: ./.github/actions/lint-no-bare-return-empty-array
        with:
          source-root: ${{ github.workspace }}
      - name: lint-no-bare-return-empty-array (consumer)
        if: github.repository != 'Klark-Morrigan/Common-PowerShell'
        uses: ./.powershell-common/.github/actions/lint-no-bare-return-empty-array
        with:
          source-root: ${{ github.workspace }}

      # PSScriptAnalyzer runs last of the three static lints: it installs the
      # analyzer module on demand and walks the whole tree, so it is the
      # heaviest of the three, yet still cheaper than the behavioural unit
      # run it precedes. Its rule set and severity bar live in the action's
      # PSScriptAnalyzerSettings.psd1, not in this workflow.
      - name: lint-powershell-psscriptanalyzer (self)
        if: github.repository == 'Klark-Morrigan/Common-PowerShell'
        uses: ./.github/actions/lint-powershell-psscriptanalyzer
        with:
          source-root: ${{ github.workspace }}
      - name: lint-powershell-psscriptanalyzer (consumer)
        if: github.repository != 'Klark-Morrigan/Common-PowerShell'
        uses: ./.powershell-common/.github/actions/lint-powershell-psscriptanalyzer
        with:
          source-root: ${{ github.workspace }}

      - name: run-unit-tests (self)
        if: github.repository == 'Klark-Morrigan/Common-PowerShell'
        uses: ./.github/actions/run-unit-tests
      - name: run-unit-tests (consumer)
        if: github.repository != 'Klark-Morrigan/Common-PowerShell'
        uses: ./.powershell-common/.github/actions/run-unit-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-ps7
          path: TestResults.xml
          # TestResults.xml is per-attempt; re-runs of the same workflow
          # otherwise collide with the prior attempt's artifact and fail
          # with an annotation-only error (no in-step log line).
          overwrite: true
