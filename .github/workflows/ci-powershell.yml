name: CI

# Reusable unit-test workflow for PowerShell repos. Delegates to two
# composite actions in PowerShell-Common:
#   - run-unit-tests:                  excludes Tests\Integration\ automatically.
#   - lint-no-bare-return-empty-array: catches the producer-side empty-array
#                                      footgun on every consumer PR.
# Integration tests run separately via ci-powershell-docker-host.yml and
# ci-powershell-docker-target.yml.
#
# Every `uses:` for a PowerShell-Common composite is a local `./` path,
# never a fully-qualified `@master` ref. The reason: GitHub Actions
# eagerly resolves every registry-form `uses:` at job-prep time before
# step-level `if:` guards are evaluated, so a PR that introduces a
# brand new composite would fail prep before any step could run. Local
# refs are resolved at step-execution time after checkout has
# populated the workspace, so they side-step the eager-resolution
# failure mode entirely. External consumers get a conditional sparse
# checkout of PowerShell-Common at master into `.powershell-common/` so the
# external `./` branch has a populated path.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-ps7:
    name: Unit (PowerShell 7)
    runs-on: windows-latest

    # See ci-powershell-docker-host.yml for why this is declared at the
    # job level of the reusable workflow rather than left to the caller.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'VitaliiAndreev/PowerShell-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/PowerShell-Common
          ref: master
          path: .powershell-common
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      # Unit tests run BEFORE the lint pass so the lint helpers'
      # own tests gate the lint's correctness. The lint scans for
      # bare `return @()` in production .ps1 across the consumer
      # repo; if the lint itself had a bug that made it pass-always,
      # running it first would let the bare-return bug land while
      # only the next PR caught the broken lint. Running tests first
      # closes that one-commit gap. The lint is fast (sub-second on
      # ~50 .ps1 files), so the cost of running it second is
      # negligible.
      - if: github.repository == 'VitaliiAndreev/PowerShell-Common'
        uses: ./.github/actions/run-unit-tests

      - if: github.repository != 'VitaliiAndreev/PowerShell-Common'
        uses: ./.powershell-common/.github/actions/run-unit-tests

      - if: github.repository == 'VitaliiAndreev/PowerShell-Common'
        uses: ./.github/actions/lint-no-bare-return-empty-array
        with:
          source-root: ${{ github.workspace }}

      - if: github.repository != 'VitaliiAndreev/PowerShell-Common'
        uses: ./.powershell-common/.github/actions/lint-no-bare-return-empty-array
        with:
          source-root: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-ps7
          path: TestResults.xml
          # TestResults.xml is per-attempt; re-runs of the same workflow
          # otherwise collide with the prior attempt's artifact and fail
          # with an annotation-only error (no in-step log line).
          overwrite: true
