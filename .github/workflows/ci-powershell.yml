name: CI

# Reusable unit-test workflow for PowerShell repos. Checks out
# PowerShell-Common and calls Run-Tests.ps1 directly, excluding
# Tests\Integration\ automatically. Integration tests run separately via
# ci-powershell-docker-host.yml and ci-powershell-docker-target.yml.
#
# Consumer repos call this workflow from their own ci.yml instead of
# maintaining their own run-tests logic for CI.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-ps7:
    name: Unit (PowerShell 7)
    runs-on: windows-latest

    # See ci-powershell-docker-host.yml for why this is declared at the
    # job level of the reusable workflow rather than left to the caller.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/PowerShell-Common
          ref: ${{ github.repository == 'VitaliiAndreev/PowerShell-Common' && github.sha || 'master' }}
          path: .ci-common

      # Unit tests run BEFORE the lint pass so the lint helpers'
      # own tests gate the lint's correctness. The lint scans for
      # bare `return @()` in production .ps1 across the consumer
      # repo; if the lint itself had a bug that made it pass-always,
      # running it first would let the bare-return bug land while
      # only the next PR caught the broken lint. Running tests first
      # closes that one-commit gap. The lint is fast (sub-second on
      # ~50 .ps1 files), so the cost of running it second is
      # negligible.
      - name: Run unit tests
        shell: pwsh
        run: |
          .ci-common/.github/actions/run-unit-tests/Run-Tests.ps1 `
            -TestsRoot '${{ github.workspace }}'

      # Lint pass after the unit suite. Logic + comment-aware regex
      # live in the script alongside other reusable action helpers;
      # see its header for rationale.
      - name: Lint - no bare `return @()`
        shell: pwsh
        run: |
          .ci-common/.github/actions/lint-no-bare-return-empty-array/Test-NoBareReturnEmptyArray.ps1 `
            -SourceRoot '${{ github.workspace }}'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-ps7
          path: TestResults.xml
          # TestResults.xml is per-attempt; re-runs of the same workflow
          # otherwise collide with the prior attempt's artifact and fail
          # with an annotation-only error (no in-step log line).
          overwrite: true
