name: Lint - no bare `return @()`
description: >
  Fails the build if any production .ps1 under source-root contains a
  bare `return @()`. Wraps Test-NoBareReturnEmptyArray.ps1 so this
  lint can be consumed via `uses:` from any downstream workflow,
  matching the rest of the Common-PowerShell composite-action shape.

inputs:
  source-root:
    description: >
      Root directory of the repo under lint. Typically the
      `github.workspace` value from the calling workflow. The
      substitution-expression syntax is intentionally omitted here -
      composite-action description strings are evaluated at manifest
      load time, before the `github` context exists, so a literal
      expression in the description would fail manifest validation
      with `Unrecognized named-value: github`.
    required: true
  shell:
    description: >
      Shell to use: 'powershell' for PowerShell 5.1, 'pwsh' for
      PowerShell 7. Defaults to pwsh to match the rest of the CI bar.
    required: false
    default: pwsh

runs:
  using: composite
  steps:
    - shell: ${{ inputs.shell }}
      # ${{ github.action_path }} is the directory where the runner downloaded
      # this action's files. Test-NoBareReturnEmptyArray.ps1 is co-located in
      # that same directory.
      run: |
        & "${{ github.action_path }}/Test-NoBareReturnEmptyArray.ps1" -SourceRoot '${{ inputs.source-root }}'
