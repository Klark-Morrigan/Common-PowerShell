name: Run integration tests
description: >
  Runs integration tests in Docker containers by calling
  Run-IntegrationTests.ps1 from Common-PowerShell. Tests run under
  PowerShell 7 only - the mcr.microsoft.com/powershell image is Linux-based
  and PowerShell 5.1 has no Docker image.

inputs:
  docker-image:
    description: >
      Docker image to run tests in. Defaults to
      mcr.microsoft.com/powershell:latest. Repos whose tests require system
      packages (e.g. openssh-server) that are not available in the default
      image can pin a specific Ubuntu variant here, e.g.
      mcr.microsoft.com/powershell:ubuntu-22.04.
    required: false
    default: 'mcr.microsoft.com/powershell:latest'
  test-file-paths:
    description: >
      Comma-separated absolute paths of pre-discovered *.Tests.ps1 files,
      produced by the workflow scan step. When provided, Run-IntegrationTests.ps1
      skips its own filesystem scan. Empty string triggers internal discovery.
    required: false
    default: ''
  module-dir:
    description: >
      Name of the pre-discovered module directory (the subdirectory whose name
      matches its .psd1), produced by the workflow scan step. When provided,
      Run-IntegrationTests.ps1 skips its own module directory detection.
      Empty string triggers internal detection.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Run integration tests
      shell: pwsh
      # ${{ github.action_path }} is substituted by the runner before PowerShell
      # runs - it resolves to the directory where the action's files were
      # downloaded. Run-IntegrationTests.ps1 is co-located in that directory.
      run: |
        & "${{ github.action_path }}/Run-IntegrationTests.ps1" `
          -TestsRoot      '${{ github.workspace }}' `
          -DockerImage    '${{ inputs.docker-image }}' `
          -TestFilePaths  '${{ inputs.test-file-paths }}' `
          -ModuleDirName  '${{ inputs.module-dir }}'
