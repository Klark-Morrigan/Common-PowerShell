name: Check if manifest version is new
description: >
  Reads ModuleVersion from the .psd1 manifest and checks whether that version
  is already published to PSGallery. Outputs version_is_new=true when the
  version is not yet on the gallery, false otherwise. PSGallery - not the git
  tag - is the source of truth, so a prior run that tagged but failed to publish
  is reported as still needing a release and the pipeline can self-heal on retry.

inputs:
  psd1:
    description: >
      Path to the .psd1 manifest relative to the repo root
      (e.g. Common.PowerShell\Common.PowerShell.psd1).
    required: true

outputs:
  version_is_new:
    description: "'true' if the current ModuleVersion is not yet on PSGallery, 'false' otherwise."
    value: ${{ steps.check.outputs.version_is_new }}

runs:
  using: composite
  steps:
    - name: Check if manifest version is published
      id: check
      shell: pwsh
      # ${{ github.action_path }} resolves to the runner's clone of this action's
      # source, so the function file is available regardless of the caller's
      # working directory. Mirrors tag-from-manifest's dot-source pattern.
      run: |
        . "${{ github.action_path }}\Test-ManifestVersionIsNew.ps1"
        Test-ManifestVersionIsNew -Psd1 '${{ inputs.psd1 }}' | Out-Null
