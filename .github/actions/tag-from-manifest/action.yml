name: Tag from manifest version
description: >
  When the ModuleVersion in the .psd1 manifest is new, creates and pushes
  three tags on the current HEAD: the immutable module tag X.Y.Z
  (gates PSGallery publish), the immutable GitHub Actions consumer tag
  vX.Y.Z, and the floating major tag vX (force-moved on every release).
  If the module tag already exists the step is skipped, leaving the
  action tags untouched - workflow-only releases are advanced manually
  via Publish-VersionTags.ps1 instead. Requires the calling workflow to
  have 'permissions: contents: write' and to check out with
  'fetch-depth: 0' so existing tags are visible to the clobber checks.

inputs:
  psd1:
    description: >
      Relative path to the .psd1 manifest inside the caller's repository
      (e.g. 'PowerShell.Common\PowerShell.Common.psd1').
    required: true

outputs:
  tag_created:
    description: "'true' if a new tag was created, 'false' if it already existed."
    value: ${{ steps.tag.outputs.tag_created }}

runs:
  using: composite
  steps:
    - name: Tag from manifest version
      id: tag
      shell: pwsh
      # ${{ github.action_path }} is substituted by the runner before PowerShell
      # runs - it becomes the literal path where the runner downloaded this
      # action's source files (a separate clone of PowerShell-Common).
      # The caller's working directory is unaffected, so the script does not
      # need to exist in the caller's repository.
      run: |
        . "${{ github.action_path }}\Invoke-TagFromManifest.ps1"
        Invoke-TagFromManifest -Psd1 '${{ inputs.psd1 }}'
